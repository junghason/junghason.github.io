<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#8ecae6" />
  <title>대포 탱크 🎯🚜</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 시작 화면 -->
  <section id="start-screen" class="screen">
    <h1 class="title">대포 <span class="pop">탱크</span> 🎯🚜</h1>
    <p class="subtitle">탱크를 쭈욱~ 당겼다 놓아서<br />포탄을 날려 장애물을 와르르 무너뜨려요!</p>

    <div class="how-to">
      <div class="how-item"><span class="how-emoji">👇</span> 화면을 누른 채 <b>아래로 당겨요</b></div>
      <div class="how-item"><span class="how-emoji">🎯</span> 점선을 보고 <b>발사각·힘</b>을 맞춰요</div>
      <div class="how-item"><span class="how-emoji">🚀</span> 손가락을 <b>떼면 발사!</b></div>
      <div class="how-item"><span class="how-emoji">🎈</span> 풍선을 다 터뜨리면 통과!</div>
    </div>

    <div class="level-row" id="level-row">
      <button class="level-btn active" data-diff="easy">쉬워요 🐢</button>
      <button class="level-btn" data-diff="normal">보통 🐰</button>
      <button class="level-btn" data-diff="hard">어려워요 🐆</button>
    </div>

    <button id="start-btn" class="big-btn">출발! ▶️</button>
    <button class="music-btn music-toggle" aria-label="배경음악 켜기/끄기">🎵</button>
  </section>

  <!-- 게임 화면 -->
  <section id="game-screen" class="screen hidden">
    <div class="topbar">
      <div class="topbar-left">
        <button id="home-btn" class="home-btn" aria-label="처음으로">🏠</button>
        <button class="home-btn music-btn" aria-label="배경음악 켜기/끄기">🎵</button>
      </div>
      <span class="score" id="stage">스테이지 1</span>
      <span class="hearts" id="ammo">⚪⚪⚪</span>
    </div>
    <canvas id="game" class="game-canvas"></canvas>
  </section>

  <!-- 결과 화면 -->
  <section id="over-screen" class="screen hidden">
    <div class="over-emoji" id="over-emoji">🎉</div>
    <h2 class="over-title" id="over-title">참 잘했어요!</h2>
    <p class="over-score" id="over-score">🎈 0개 터뜨렸어요</p>
    <button id="next-btn" class="big-btn hidden">다음 스테이지 ⏭️</button>
    <button id="again-btn" class="big-btn ghost">다시 할래요! 🔄</button>
    <button id="over-home-btn" class="big-btn ghost">처음으로 🏠</button>
  </section>

  <script src="game.js"></script>
</body>
</html>
